<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="icons/jiandao-icon.png">
  <title>键道</title>
  <style>
    :root {
      --ink: #6d7176;
      --muted: #92979d;
      --line: #cfd4df;
      --blue: #6fa7f2;
      --blue-dark: #3575de;
      --paper: #fbfcfe;
      --key: #ffffff;
      --good: #56b786;
      --bad: #df6464;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      background: linear-gradient(#f8fafc 0 66%, #f1f3f6 66% 100%);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      user-select: none;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 44px minmax(210px, 34vh) 1fr;
    }

    .titlebar {
      height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      background: #eef3f9;
      color: #24282d;
      border-bottom: 1px solid #e5e9ef;
      font-size: 18px;
    }

    .article-tools {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .article-tools select,
    .article-tools button,
    .editor input[type="file"],
    .editor input,
    .editor textarea {
      border: 1px solid #c7ccd4;
      border-radius: 6px;
      background: #fff;
      color: #4f5965;
      font: inherit;
    }

    .article-tools select {
      width: 220px;
      height: 30px;
      padding: 0 8px;
    }

    .article-tools select.collection-select {
      width: 140px;
    }

    .article-tools button,
    .editor-actions button {
      height: 30px;
      padding: 0 12px;
      cursor: pointer;
    }

    .article-tools button.primary,
    .editor-actions button.primary {
      border-color: #5c94de;
      background: #6fa7f2;
      color: #fff;
    }

    .article-tools input[type="file"] {
      display: none;
    }

    .logo {
      width: 23px;
      height: 23px;
      display: grid;
      place-items: center;
      background: #ffc43c;
      border-radius: 3px;
      color: #252525;
      font-weight: 800;
      font-size: 15px;
      transform: rotate(-4deg);
      box-shadow: inset 0 -2px rgba(0, 0, 0, .08);
    }

    .lesson {
      position: relative;
      padding: 0 48px 18px 58px;
      background: var(--paper);
      border-bottom: 1px solid #e4e8f0;
      overflow: hidden auto;
      scroll-behavior: smooth;
      scrollbar-gutter: stable;
      scrollbar-width: auto;
      scrollbar-color: #8d95a3 #edf1f6;
    }

    .lesson::-webkit-scrollbar {
      width: 14px;
    }

    .lesson::-webkit-scrollbar-track {
      background: #edf1f6;
      border-radius: 999px;
    }

    .lesson::-webkit-scrollbar-thumb {
      background: #9aa3b1;
      border: 3px solid #edf1f6;
      border-radius: 999px;
    }

    .lesson::-webkit-scrollbar-thumb:hover {
      background: #747e8e;
    }

    .phrase {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px 14px;
      padding-top: 12px;
      max-width: 1100px;
      padding-bottom: 18px;
    }

    .lesson-meta {
      max-width: 1100px;
      min-height: 34px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding-top: 10px;
      color: #555d67;
      font-size: 15px;
    }

    .lesson-meta strong {
      color: #313942;
      font-size: 19px;
      font-weight: 650;
    }

    .lesson-meta span {
      color: #7d838b;
    }

    .syllable {
      width: max-content;
      min-width: 62px;
      min-height: 90px;
      text-align: center;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 7px;
      transition: transform .12s ease, color .12s ease;
    }

    .syllable.punct {
      min-width: 34px;
      align-self: flex-end;
    }

    .syllable.active {
      color: #43484e;
      transform: translateY(-2px);
    }

    .pinyin {
      display: block;
      min-width: 100%;
      padding: 0 4px;
      font-size: clamp(24px, 3vw, 40px);
      line-height: 1.05;
      letter-spacing: 1px;
      white-space: nowrap;
      color: #74777b;
    }

    .hanzi {
      display: block;
      font-family: "KaiTi", "STKaiti", "Microsoft YaHei", serif;
      font-size: clamp(28px, 2.9vw, 40px);
      line-height: 1.05;
      color: #85888d;
      letter-spacing: 0;
    }

    .article-text {
      max-width: 1060px;
      font-size: clamp(30px, 4vw, 56px);
      line-height: 1.55;
      letter-spacing: .5px;
      color: #74777b;
      white-space: pre-wrap;
      font-variant-ligatures: none;
    }

    .article-text .typed {
      color: #a8adb4;
    }

    .article-text > span {
      display: inline-block;
      min-width: .62em;
      margin-right: .055em;
      text-align: center;
    }

    .article-text .current-char {
      display: inline-grid;
      place-items: center;
      min-width: .72em;
      height: 1.12em;
      margin: 0 .05em;
      color: #3575de;
      background: rgba(111, 167, 242, .16);
      border-radius: 6px;
      line-height: 1;
      vertical-align: -.05em;
    }

    .syllable.done .pinyin,
    .syllable.done .hanzi {
      color: #a9adb3;
    }

    .trainer {
      position: relative;
      display: grid;
      grid-template-rows: 42px auto 1fr;
      justify-items: center;
      padding-top: 12px;
      overflow: hidden;
    }

    .hud {
      width: min(984px, calc(100vw - 64px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #7b8087;
      font-size: 16px;
    }

    .current {
      font-size: 24px;
      color: #4d5560;
    }

    .current strong {
      color: var(--blue-dark);
      font-size: 32px;
      margin-left: 8px;
    }

    .stats {
      display: flex;
      gap: 18px;
      white-space: nowrap;
    }

    .keyboard {
      position: relative;
      width: min(984px, calc(100vw - 64px));
      display: grid;
      gap: 4px;
      z-index: 2;
    }

    .row {
      display: grid;
      gap: 4px;
      height: 54px;
    }

    .row.numbers {
      grid-template-columns: repeat(13, 1fr) 1.55fr;
    }

    .row.top {
      grid-template-columns: 1.55fr repeat(12, 1fr);
    }

    .row.home {
      grid-template-columns: 1.85fr repeat(11, 1fr) 1.85fr;
    }

    .row.bottom {
      grid-template-columns: 1.9fr repeat(10, 1fr) 2.3fr;
    }

    .row.space {
      grid-template-columns: 1.9fr 1.9fr 4.5fr 1.9fr 3fr;
      height: 60px;
    }

    .key {
      position: relative;
      min-width: 0;
      display: grid;
      place-items: center;
      border: 1px solid #b9bdc3;
      border-radius: 6px;
      background: linear-gradient(#fff, #f7f8fa);
      color: #66707b;
      font-size: clamp(18px, 2.1vw, 30px);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, .04);
      transition: transform .05s ease, background .08s ease, color .08s ease, border-color .08s ease;
    }

    .key.small {
      font-size: 14px;
      justify-items: start;
      padding-left: 12px;
    }

    .key.dual {
      line-height: 1;
      gap: 3px;
      font-size: 24px;
    }

    .key.dual span:last-child {
      color: #63707e;
    }

    .key.next {
      background: linear-gradient(#9ecbfb, #82b9f3);
      border-color: #5c94de;
      color: #fff;
      box-shadow: 0 0 0 5px rgba(75, 133, 228, .25), inset 0 -2px 0 rgba(0, 0, 0, .08);
    }

    .key.pressed {
      transform: translateY(2px);
      background: linear-gradient(#d7eaff, #b7d7fb);
    }

    .key.wrong {
      background: linear-gradient(#ffe3e3, #ffc9c9);
      border-color: var(--bad);
      color: #9b3434;
    }

    .hands {
      position: absolute;
      left: 50%;
      top: 54px;
      width: min(984px, calc(100vw - 64px));
      height: 320px;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      mix-blend-mode: multiply;
      transition: opacity .16s ease;
    }

    .trainer.show-hands .hands {
      opacity: .72;
    }

    .finger {
      position: absolute;
      width: 36px;
      height: 46px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      box-shadow: none;
      transform-origin: 50% 0;
      opacity: 0;
      transition: border-color .12s ease, transform .12s ease, opacity .12s ease, box-shadow .12s ease, background .12s ease;
    }

    .finger::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 38% 32%, rgba(255, 255, 255, .78), rgba(117, 123, 132, .22) 62%, rgba(117, 123, 132, .12));
      border: 2px solid rgba(112, 118, 126, .42);
      box-shadow: 0 5px 13px rgba(80, 88, 100, .12);
    }

    .finger.left.little { left: 136px; top: 116px; transform: rotate(8deg); }
    .finger.left.ring { left: 204px; top: 110px; transform: rotate(5deg); }
    .finger.left.middle { left: 272px; top: 106px; transform: rotate(2deg); }
    .finger.left.index { left: 340px; top: 112px; transform: rotate(-1deg); }
    .finger.right.index { right: 402px; top: 112px; transform: rotate(1deg); }
    .finger.right.middle { right: 337px; top: 106px; transform: rotate(-2deg); }
    .finger.right.ring { right: 272px; top: 110px; transform: rotate(-5deg); }
    .finger.right.little { right: 207px; top: 116px; transform: rotate(-8deg); }

    .thumb {
      position: absolute;
      top: 238px;
      width: 84px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      opacity: 0;
      transition: border-color .12s ease, transform .12s ease, opacity .12s ease, box-shadow .12s ease;
    }

    .thumb::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 38% 32%, rgba(255, 255, 255, .78), rgba(117, 123, 132, .22) 62%, rgba(117, 123, 132, .12));
      border: 2px solid rgba(112, 118, 126, .42);
      box-shadow: 0 5px 13px rgba(80, 88, 100, .12);
    }

    .thumb.left {
      left: 365px;
      transform: rotate(-9deg);
    }

    .thumb.right {
      right: 365px;
      transform: rotate(9deg);
    }

    .finger.active,
    .thumb.active {
      opacity: 1;
    }

    .finger.active::after,
    .thumb.active::after {
      background: radial-gradient(circle at 38% 32%, rgba(255, 255, 255, .82), rgba(79, 142, 233, .38) 62%, rgba(79, 142, 233, .24));
      border-color: rgba(52, 112, 220, .95);
      box-shadow: 0 0 0 7px rgba(52, 112, 220, .12), 0 7px 18px rgba(52, 112, 220, .22);
    }

    .toast {
      position: absolute;
      right: max(32px, calc((100vw - 984px) / 2));
      bottom: 12px;
      max-width: min(520px, calc(100vw - 64px));
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .86);
      color: #65707d;
      border: 1px solid #d9dde5;
      font-size: 15px;
      box-shadow: 0 12px 30px rgba(46, 55, 70, .08);
      z-index: 4;
      pointer-events: none;
    }

    .hidden-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .editor-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(31, 36, 45, .32);
      z-index: 10;
    }

    .editor-backdrop.open {
      display: grid;
    }

    .editor {
      width: min(720px, calc(100vw - 40px));
      padding: 18px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 24px 80px rgba(36, 43, 55, .24);
      color: #4f5965;
    }

    .editor h2 {
      margin: 0 0 12px;
      color: #303741;
      font-size: 20px;
      font-weight: 650;
    }

    .editor label {
      display: grid;
      gap: 6px;
      margin: 12px 0;
      font-size: 14px;
    }

    .editor input,
    .editor textarea {
      width: 100%;
      padding: 9px 10px;
      user-select: text;
    }

    .editor textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.5;
    }

    .editor-help {
      margin: 0;
      color: #77808a;
      font-size: 13px;
      line-height: 1.5;
    }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .small-action {
      height: 26px;
      padding: 0 9px;
      border: 1px solid #c7ccd4;
      border-radius: 6px;
      background: #fff;
      color: #4f5965;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }

    .editor-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

    @media (max-width: 760px) {
      .app {
        grid-template-rows: 42px minmax(220px, 40vh) 1fr;
      }

      .lesson {
        padding-left: 22px;
        padding-right: 28px;
      }

      .phrase {
        gap: 8px 10px;
      }

      .syllable {
        min-width: 50px;
        min-height: 80px;
      }

      .hanzi {
        letter-spacing: 0;
      }

      .article-tools {
        gap: 5px;
      }

      .article-tools select {
        width: 140px;
      }

      .article-tools select.collection-select {
        width: 108px;
      }

      .hud,
      .keyboard {
        width: calc(100vw - 20px);
      }

      .key {
        font-size: 20px;
      }

      .key.small {
        font-size: 12px;
        padding-left: 6px;
      }

      .hands {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <header class="titlebar">
      <div class="logo">键</div>
      <div>键道</div>
      <div class="article-tools">
        <select class="collection-select" id="collectionSelect" aria-label="选择栏目"></select>
        <select id="articleSelect" aria-label="选择练习文章"></select>
        <button class="primary" id="addArticleBtn" type="button">添加文章</button>
        <button id="importTxtBtn" type="button">导入TXT</button>
        <input id="txtFileInput" type="file" accept=".txt,.text,text/plain">
        <button id="deleteArticleBtn" type="button">删除</button>
      </div>
    </header>

    <section class="lesson" aria-label="练习内容">
      <div class="lesson-meta" id="lessonMeta">
        <strong id="lessonTitle"></strong>
        <span id="lessonAuthor"></span>
      </div>
      <div class="phrase" id="phrase"></div>
    </section>

    <section class="trainer" aria-label="键盘练习">
      <div class="hud">
        <div class="current">下一个键 <strong id="nextKey">z</strong></div>
        <div class="stats">
          <span>正确 <strong id="rightCount">0</strong></span>
          <span>错误 <strong id="wrongCount">0</strong></span>
          <span>进度 <strong id="progressText">0%</strong></span>
        </div>
      </div>

      <div class="keyboard" id="keyboard"></div>

      <div class="hands" aria-hidden="true">
        <div class="finger left little" data-finger="left-little"></div>
        <div class="finger left ring" data-finger="left-ring"></div>
        <div class="finger left middle" data-finger="left-middle"></div>
        <div class="finger left index" data-finger="left-index"></div>
        <div class="thumb left" data-finger="left-thumb"></div>
        <div class="thumb right" data-finger="right-thumb"></div>
        <div class="finger right index" data-finger="right-index"></div>
        <div class="finger right middle" data-finger="right-middle"></div>
        <div class="finger right ring" data-finger="right-ring"></div>
        <div class="finger right little" data-finger="right-little"></div>
      </div>

      <div class="toast" id="toast">直接开始打拼音；只有原文有空格时才按空格。清脆音效会在第一次按键后开启。</div>
      <input class="hidden-input" id="typingInput" autocomplete="off" autocapitalize="off" spellcheck="false">
    </section>
  </main>

  <div class="editor-backdrop" id="editorBackdrop" aria-hidden="true">
    <form class="editor" id="articleForm">
      <h2>添加练习文章</h2>
      <label>
        文章名称
        <input id="articleTitleInput" maxlength="24" placeholder="例如：我的拼音练习">
      </label>
      <label>
        显示内容
        <textarea id="articleDisplayInput" placeholder="这里写你想看到的文章，可以是中文、英文或数字。"></textarea>
      </label>
      <label>
        <span class="field-row">
          <span>实际输入内容</span>
          <button class="small-action" id="autoPinyinBtn" type="button">自动生成拼音</button>
        </span>
        <textarea id="articleTargetInput" placeholder="中文文章建议填写不带声调的拼音；英文文章可直接复制显示内容。"></textarea>
      </label>
      <p class="editor-help">提示：中文会自动生成拼音；汉字之间不会自动加空格，只有原文真的有空格时才需要按空格。少数字库外的生僻字可在这里手动修正。</p>
      <div class="editor-actions">
        <button id="cancelArticleBtn" type="button">取消</button>
        <button class="primary" type="submit">保存</button>
      </div>
    </form>
  </div>

  <script src="tang300-data.js"></script>
  <script src="caigentan-data.js"></script>
  <script>

      {

      },
      {
        id: "finger-combo-pinyin",

        category: "组合练习",

        display: "zh ch sh ang eng ing, zhong guo, jian dao.",

      {
        id: "finger-combo-mixed",
        title: "组合练习：字母数字符号",
        category: "组合练习",
        collection: "fingering",
        display: "abc123 def456 key-2026 code_88 ok!",
        target: "abc123 def456 key-2026 code_88 ok!"
      }
    ];

    const builtinArticles = [

    const nextKeyEl = document.getElementById("nextKey");
    const rightCountEl = document.getElementById("rightCount");
    const wrongCountEl = document.getElementById("wrongCount");
    const progressTextEl = document.getElementById("progressText");
    const toastEl = document.getElementById("toast");
    const inputEl = document.getElementById("typingInput");
    const collectionSelectEl = document.getElementById("collectionSelect");
    const articleSelectEl = document.getElementById("articleSelect");
    const addArticleBtn = document.getElementById("addArticleBtn");
    const importTxtBtn = document.getElementById("importTxtBtn");
    const txtFileInput = document.getElementById("txtFileInput");
    const deleteArticleBtn = document.getElementById("deleteArticleBtn");
    const editorBackdrop = document.getElementById("editorBackdrop");
    const articleForm = document.getElementById("articleForm");
    const articleTitleInput = document.getElementById("articleTitleInput");
    const articleDisplayInput = document.getElementById("articleDisplayInput");
    const articleTargetInput = document.getElementById("articleTargetInput");
    const autoPinyinBtn = document.getElementById("autoPinyinBtn");
    const cancelArticleBtn = document.getElementById("cancelArticleBtn");
    const lessonTitleEl = document.getElementById("lessonTitle");
    const lessonAuthorEl = document.getElementById("lessonAuthor");

    const storageKey = "typingHeroCustomArticles";
    const hiddenCollectionsKey = "typingHeroHiddenCollections";
    let customArticles = loadCustomArticles();
    let hiddenCollections = loadHiddenCollections();
    let currentCollection = "fingering";
    let articles = [];
    let currentArticle = builtinLibrary[0];
    let lesson = currentArticle.units || [];
    let target = articleTarget(currentArticle);
    let position = 0;
    let right = 0;
    let wrong = 0;
    let audioContext;
    let noiseBuffer;
    let toastTimer;
    let startTime = 0;

    function loadCustomArticles() {
      try {
        const stored = JSON.parse(localStorage.getItem(storageKey) || "[]");
        return Array.isArray(stored) ? stored.filter(item => item && item.title && (item.target || item.units)).map(normalizeCustomArticle) : [];
      } catch {
        return [];
      }
    }

    function saveCustomArticles() {
      try {
        localStorage.setItem(storageKey, JSON.stringify(customArticles));
        return true;
      } catch {
        showToast("保存失败：文章太长，已超过浏览器本地存储容量。");
        return false;
      }
    }

    function normalizeCustomArticle(article) {
      return { ...article, collection: "custom", custom: true };
    }

    function loadHiddenCollections() {
      try {
        const stored = JSON.parse(localStorage.getItem(hiddenCollectionsKey) || "[]");
        return new Set(Array.isArray(stored) ? stored : []);
      } catch {
        return new Set();
      }
    }

    function saveHiddenCollections() {
      localStorage.setItem(hiddenCollectionsKey, JSON.stringify([...hiddenCollections]));
    }

    function articleTarget(article) {
      if (article.target) return article.target.toLowerCase();
      if (article.units) return buildTargetFromUnits(article.units).toLowerCase();
      if (article.display) return generatedTargetFor(article.display);
      return "";
    }

    function articleDisplayText(article) {
      if (article.display) return article.display;
      return (article.units || []).map(item => item.hz).join("");
    }

    function articleLabel(article) {
      return article.label || article.title;
    }

    function renderCollectionOptions() {
      const visibleCollections = collections.filter(item => item.fixed || !hiddenCollections.has(item.id) || item.id === "custom");
      collectionSelectEl.innerHTML = visibleCollections.map(item => `<option value="${item.id}">${item.title}</option>`).join("");
      collectionSelectEl.value = currentCollection;
    }

    function articlesForCollection(collectionId) {
      if (collectionId === "custom") return customArticles;
      if (collectionId === "caigentan") return caigentanItems;
      if (collectionId === "tang300") return tangPoems;
      return builtinLibrary.filter(item => item.collection === collectionId);
    }

    function renderArticleOptions() {
      if (currentCollection !== "tang300" && currentCollection !== "caigentan" && currentCollection !== "fingering") {
        articleSelectEl.innerHTML = articles.map(item => `<option value="${item.id}">${escapeHtml(articleLabel(item))}</option>`).join("");
        return;
      }

      const groups = new Map();
      articles.forEach(item => {
        const key = item.category || "唐诗三百首";
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(item);
      });
      articleSelectEl.innerHTML = [...groups.entries()].map(([group, items]) => `
        <optgroup label="${escapeHtml(group)}">
          ${items.map(item => `<option value="${item.id}">${escapeHtml(articleLabel(item))}</option>`).join("")}
        </optgroup>
      `).join("");
    }

    function refreshArticles(selectedId = currentArticle && currentArticle.id, collectionId = currentCollection) {
      currentCollection = collectionId || "basic";
      if (hiddenCollections.has(currentCollection) && currentCollection !== "custom") {
        currentCollection = firstAvailableCollection();
      }
      articles = articlesForCollection(currentCollection);
      if (!articles.length && currentCollection === "custom") {
        currentCollection = firstAvailableCollection();
        articles = articlesForCollection(currentCollection);
      }
      currentArticle = articles.find(item => item.id === selectedId) || articles[0] || builtinLibrary[0];
      renderCollectionOptions();
      renderArticleOptions();
      articleSelectEl.value = currentArticle.id;
      lesson = currentArticle.units || (currentArticle.display && !currentArticle.target ? textToUnits(currentArticle.display) : []);
      target = articleTarget(currentArticle);
      updateLessonMeta();
      updateDeleteButton();
    }

    function firstAvailableCollection() {
      const found = collections.find(item => item.id !== "custom" && (item.fixed || !hiddenCollections.has(item.id)) && articlesForCollection(item.id).length);
      return found ? found.id : "custom";
    }

    function updateDeleteButton() {
      if (currentCollection === "fingering") {
        deleteArticleBtn.disabled = true;
        deleteArticleBtn.textContent = "固定栏目";
        deleteArticleBtn.title = "指法练习是固定栏目，不能删除。";
        return;
      }
      if (currentCollection === "custom") {
        deleteArticleBtn.disabled = !customArticles.length;
        deleteArticleBtn.textContent = customArticles.length > 1 ? "删除本文" : "删除";
        deleteArticleBtn.title = customArticles.length > 1 ? "删除当前自定义文章；按住 Shift 点击可清空我的文章" : "删除当前自定义文章";
        return;
      }
      deleteArticleBtn.disabled = false;
      deleteArticleBtn.textContent = "删除栏目";
      deleteArticleBtn.title = "从界面隐藏当前栏目，不会删除程序文件";
    }

    function updateLessonMeta() {
      lessonTitleEl.textContent = currentArticle.title || "";
      lessonAuthorEl.textContent = currentArticle.author ? `作者：${currentArticle.author}` : "";
    }

    function renderPhrase() {
      if (!lesson.length) {
        phraseEl.innerHTML = `<div class="article-text" id="articleText"></div>`;
        renderTextArticle();
        return;
      }

      phraseEl.innerHTML = lesson.map((item, index) => `
        <span class="syllable ${isPunctuationUnit(item) ? "punct" : ""}" data-start="${startOf(index)}" data-end="${endOf(index)}">
          <span class="pinyin">${escapeHtml(item.show || item.py)}</span>
          <span class="hanzi">${escapeHtml(item.hz)}</span>
        </span>
      `).join("");
    }

    function renderTextArticle() {
      const textEl = document.getElementById("articleText");
      if (!textEl) return;
      const display = articleDisplayText(currentArticle);
      textEl.innerHTML = [...display].map((char, index) => {
        const className = index < position ? "typed" : index === position ? "current-char" : "";
        return `<span class="${className}">${escapeHtml(char)}</span>`;
      }).join("");
    }

    function startOf(index) {
      return lesson.slice(0, index).reduce((sum, item) => sum + item.py.length, 0);
    }

    function endOf(index) {
      return startOf(index) + lesson[index].py.length;
    }

    function isChineseChar(char) {
      return /[\u3400-\u9fff]/.test(char);
    }

    function isPunctuationChar(char) {
      return /[，。！？、；：,.!?;:]/.test(char);
    }

    function isPunctuationUnit(item) {
      return item && item.py.length === 1 && isPunctuationChar(item.py);
    }

    function buildTargetFromUnits(units) {
      return units.map(item => item.py || "").join("");
    }

    function charToTypingUnit(char) {
      if (char === "\r") return null;
      if (char === "\n") return { py: " ", hz: " ", show: "空" };
      if (/\s/.test(char)) return { py: " ", hz: " ", show: "空" };
      if (isPunctuationChar(char)) return { py: normalizePunctuation(char), hz: char, show: normalizePunctuation(char) };
      if (isChineseChar(char)) {
        const py = pinyinDict[char] || char;
        return { py, hz: char, unknown: py === char };
      }
      return { py: char.toLowerCase(), hz: char };
    }

    function normalizePunctuation(char) {
      const map = { "，": ",", "。": ".", "！": "!", "？": "?", "；": ";", "：": ":", "、": "," };
      return map[char] || char;
    }

    function textToUnits(text) {
      return [...text].map(charToTypingUnit).filter(Boolean);
    }

    function generatedTargetFor(text) {
      const units = textToUnits(text);
      return buildTargetFromUnits(units).toLowerCase();
    }

    function targetFromPlainText(text) {
      return text.toLowerCase();
    }

    function isLargeEnglishText(text, fileName = "") {
      const ascii = (text.match(/[A-Za-z]/g) || []).length;
      const chinese = (text.match(/[\u3400-\u9fff]/g) || []).length;
      return text.length > 8000 || /新概念|concept|ocr/i.test(fileName) || ascii > chinese * 1.2;
    }

    function extractEnglishPracticeText(text) {
      return text
        .replace(/^===== Page \d+ =====$/gm, "\n")
        .split(/\r?\n/)
        .map(line => line
          .replace(/[\u3400-\u9fff]+/g, " ")
          .replace(/[^\x20-\x7E]+/g, " ")
          .replace(/\s+/g, " ")
          .trim()
        )
        .filter(line => /[A-Za-z]{2,}/.test(line))
        .join("\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function splitTextChunks(text, maxLength = 2200) {
      const parts = text.split(/\n{2,}/).map(part => part.trim()).filter(Boolean);
      const chunks = [];
      let current = "";
      parts.forEach(part => {
        if ((current + "\n\n" + part).trim().length > maxLength && current) {
          chunks.push(current.trim());
          current = "";
        }
        if (part.length > maxLength) {
          const sentences = part.match(/[^.!?。！？]+[.!?。！？]?/g) || [part];
          sentences.forEach(sentence => {
            if ((current + " " + sentence).trim().length > maxLength && current) {
              chunks.push(current.trim());
              current = "";
            }
            current = `${current} ${sentence}`.trim();
          });
        } else {
          current = `${current}\n\n${part}`.trim();
        }
      });
      if (current) chunks.push(current.trim());
      return chunks;
    }

    function unknownPinyinCount(units) {
      return units.filter(item => item.unknown).length;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderKeyboard() {
      const names = ["numbers", "top", "home", "bottom", "space"];
      keyboardEl.innerHTML = rows.map((row, index) => `
        <div class="row ${names[index]}">
          ${row.map(key => {
            const id = key[0];
            const main = key[1] || key[0];
            const lower = key[2];
            const extra = key[3] || "";
            const classes = lower ? "key dual" : `key ${extra}`;
            return `<div class="${classes}" data-key="${id}">
              ${lower ? `<span>${main}</span><span>${lower}</span>` : main}
            </div>`;
          }).join("")}
        </div>
      `).join("");
    }

    function normalizeKey(event) {
      if (event.key === "Spacebar") return " ";
      if (event.key === " ") return " ";
      if (event.key.length === 1) return event.key.toLowerCase();
      return event.key;
    }

    function nextChar() {
      return target[position] || "";
    }

    function keyLabel(key) {
      if (key === " ") return "空格";
      if (shiftedKeyMap[key]) return `Shift + ${shiftedKeyMap[key]}`;
      return key;
    }

    function updateUi() {
      const next = nextChar();
      trainerEl.classList.toggle("show-hands", currentCollection === "fingering");
      nextKeyEl.textContent = next ? keyLabel(next) : "完成";
      rightCountEl.textContent = right;
      wrongCountEl.textContent = wrong;
      const progress = target.length ? Math.round((position / target.length) * 100) : 0;
      progressTextEl.textContent = `${progress}%`;

      document.querySelectorAll(".key").forEach(key => {
        key.classList.remove("next", "wrong");
        if (matchesKey(key.dataset.key, next)) key.classList.add("next");
      });

      document.querySelectorAll("[data-finger]").forEach(finger => {
        finger.classList.toggle("active", finger.dataset.finger === fingerMap[next]);
      });

      document.querySelectorAll(".syllable").forEach(item => {
        const start = Number(item.dataset.start);
        const end = Number(item.dataset.end);
        item.classList.toggle("done", position >= end);
        item.classList.toggle("active", position >= start && position < end);
      });

      renderTextArticle();
      scrollCurrentIntoView();
    }

    function scrollCurrentIntoView() {
      const active = document.querySelector(".syllable.active") || document.querySelector(".article-text .current-char");
      if (!active) return;
      const lessonPanel = phraseEl.parentElement;
      const lessonRect = lessonPanel.getBoundingClientRect();
      const activeRect = active.getBoundingClientRect();
      const topGuard = 72;
      const bottomGuard = Math.max(96, lessonRect.height * .38);

      if (activeRect.top < lessonRect.top + topGuard || activeRect.bottom > lessonRect.bottom - bottomGuard) {
        const targetTop = lessonPanel.scrollTop + activeRect.top - lessonRect.top - Math.max(68, lessonRect.height * .28);
        lessonPanel.scrollTo({
          top: Math.max(0, targetTop),
          behavior: "smooth"
        });
      }
    }

    function matchesKey(id, key) {
      if (!key) return false;
      if (key === " " && id === " ") return true;
      return id.toLowerCase() === (shiftedKeyMap[key] || key);
    }

    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * .08, audioContext.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < data.length; i += 1) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2.4);
        }
      }
      if (audioContext.state === "suspended") audioContext.resume();
    }

    function clickSound(ok) {
      initAudio();
      const now = audioContext.currentTime;
      const noise = audioContext.createBufferSource();
      const noiseGain = audioContext.createGain();
      const click = audioContext.createOscillator();
      const clickGain = audioContext.createGain();
      const high = audioContext.createBiquadFilter();
      const low = audioContext.createBiquadFilter();

      noise.buffer = noiseBuffer;
      high.type = "highpass";
      high.frequency.value = ok ? 2600 : 1200;
      high.Q.value = .8;
      low.type = "lowpass";
      low.frequency.value = ok ? 7800 : 3600;
      low.Q.value = .7;

      noiseGain.gain.setValueAtTime(0.0001, now);
      noiseGain.gain.exponentialRampToValueAtTime(ok ? .38 : .22, now + .0015);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + (ok ? .026 : .045));

      click.type = "square";
      click.frequency.setValueAtTime(ok ? 1850 : 520, now);
      click.frequency.exponentialRampToValueAtTime(ok ? 920 : 280, now + (ok ? .018 : .04));
      clickGain.gain.setValueAtTime(0.0001, now);
      clickGain.gain.exponentialRampToValueAtTime(ok ? .075 : .11, now + .002);
      clickGain.gain.exponentialRampToValueAtTime(0.0001, now + (ok ? .03 : .07));

      noise.connect(high);
      high.connect(low);
      low.connect(noiseGain);
      noiseGain.connect(audioContext.destination);
      click.connect(clickGain);
      clickGain.connect(audioContext.destination);
      noise.start(now);
      click.start(now);
      noise.stop(now + .055);
      click.stop(now + .08);
    }

    function markPressed(key, ok) {
      const targetKey = [...document.querySelectorAll(".key")].find(item => matchesKey(item.dataset.key, key));
      if (!targetKey) return;
      targetKey.classList.add(ok ? "pressed" : "wrong");
      window.setTimeout(() => targetKey.classList.remove("pressed", "wrong"), 120);
    }

    function showToast(text, duration = 1800) {
      toastEl.textContent = text;
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        toastEl.textContent = "继续输入，按 Esc 可重新开始。";
      }, duration);
    }

    function reset() {
      position = 0;
      right = 0;
      wrong = 0;
      startTime = 0;
      renderPhrase();
      updateUi();
      showToast("已重新开始。");
    }

    function selectArticle(id) {
      refreshArticles(id);
      reset();
      showArticleToast();
    }

    function selectCollection(id) {
      refreshArticles(null, id);
      reset();
      showArticleToast();
    }

    function showArticleToast(prefix = "已切换到") {
      const author = currentArticle.author ? ` / ${currentArticle.author}` : "";
      const hint = isPagedCollection() ? "按空格切换下一篇。" : "按 Esc 可重新开始。";
      showToast(`${prefix}《${currentArticle.title}${author}》。${hint}`);
    }

    function isPagedCollection() {
      return currentCollection === "tang300" || currentCollection === "caigentan";
    }

    function selectNextArticle() {
      if (!articles.length) return;
      const index = articles.findIndex(item => item.id === currentArticle.id);
      const next = articles[(index + 1 + articles.length) % articles.length];
      refreshArticles(next.id, currentCollection);
      reset();
      showArticleToast("下一篇");
    }

    function openEditor() {
      articleTitleInput.value = "";
      articleDisplayInput.value = "";
      articleTargetInput.value = "";
      editorBackdrop.classList.add("open");
      editorBackdrop.setAttribute("aria-hidden", "false");
      articleTitleInput.focus();
    }

    function closeEditor() {
      editorBackdrop.classList.remove("open");
      editorBackdrop.setAttribute("aria-hidden", "true");
      inputEl.focus();
    }

    function fillAutoPinyin() {
      const display = articleDisplayInput.value.trim();
      if (!display) {
        showToast("先填写显示内容，再生成拼音。");
        return;
      }
      articleTargetInput.value = generatedTargetFor(display);
      const missing = unknownPinyinCount(textToUnits(display));
      showToast(missing ? `已自动生成拼音，${missing} 个字需要手动确认。` : "已自动生成拼音。");
    }

    function saveArticle(event) {
      event.preventDefault();
      const title = articleTitleInput.value.trim();
      const display = articleDisplayInput.value.trim();
      const units = textToUnits(display);
      const typed = (articleTargetInput.value.trim() || buildTargetFromUnits(units)).toLowerCase();
      if (!title || !display || !typed) {
        showToast("文章名称和显示内容都要填写。");
        return;
      }

      const article = {
        id: `custom-${Date.now()}`,
        title,
        display,
        target: typed,
        units,
        collection: "custom",
        custom: true
      };
      customArticles.push(article);
      if (!saveCustomArticles()) {
        customArticles.pop();
        return;
      }
      closeEditor();
      refreshArticles(article.id, "custom");
      reset();
      const missing = unknownPinyinCount(units);
      showToast(missing ? `已添加《${title}》，${missing} 个字需要手动确认拼音。` : `已添加《${title}》。`);
    }

    function importTxtFile(file) {
      if (!file) return;
      if (!/\.(txt|text)$/i.test(file.name) && file.type && file.type !== "text/plain") {
        showToast("请选择 txt 格式文件。");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const display = String(reader.result || "").replace(/^\uFEFF/, "").trim();
        if (!display) {
          showToast("这个 TXT 文件没有可导入的内容。");
          return;
        }
        const title = file.name.replace(/\.[^.]+$/, "").slice(0, 24) || "导入文章";
        if (isLargeEnglishText(display, file.name)) {
          const practiceText = extractEnglishPracticeText(display) || display;
          const chunks = splitTextChunks(practiceText);
          if (!chunks.length) {
            showToast("没有识别到可练习的文本内容。");
            return;
          }
          const imported = chunks.map((chunk, index) => ({
            id: `custom-${Date.now()}-${index}`,
            title: chunks.length > 1 ? `${title} ${index + 1}` : title,
            display: chunk,
            target: targetFromPlainText(chunk),
            collection: "custom",
            custom: true
          }));
          customArticles.push(...imported);
          if (!saveCustomArticles()) {
            customArticles.splice(customArticles.length - imported.length, imported.length);
            return;
          }
          refreshArticles(imported[0].id, "custom");
          reset();
          txtFileInput.value = "";
          showToast(`已导入《${title}》，自动拆分为 ${imported.length} 篇英文练习。`);
          return;
        }

        const units = textToUnits(display);
        const article = {
          id: `custom-${Date.now()}`,
          title,
          display,
          target: buildTargetFromUnits(units).toLowerCase(),
          units,
          collection: "custom",
          custom: true
        };
        customArticles.push(article);
        if (!saveCustomArticles()) {
          customArticles.pop();
          return;
        }
        refreshArticles(article.id, "custom");
        reset();
        txtFileInput.value = "";
        const missing = unknownPinyinCount(units);
        showToast(missing ? `已导入《${title}》，${missing} 个字需要手动确认拼音。` : `已导入《${title}》，拼音已自动配置。`);
      };
      reader.onerror = () => showToast("读取 TXT 文件失败。");
      reader.readAsText(file, "utf-8");
    }

    function deleteCurrentArticle(event) {
      if (currentCollection === "custom") {
        deleteCustomArticle(event && event.shiftKey);
        return;
      }
      hideCurrentCollection();
    }

    function deleteCustomArticle(deleteAll = false) {
      if (!customArticles.length) {
        showToast("我的文章里没有可删除内容。");
        return;
      }

      if (deleteAll || customArticles.length === 1) {
        const ok = window.confirm(`确定删除“我的文章”中的 ${customArticles.length} 篇内容吗？`);
        if (!ok) return;
        customArticles = [];
        saveCustomArticles();
        refreshArticles(null, firstAvailableCollection());
        reset();
        showToast("已清空我的文章。");
        return;
      }

      const ok = window.confirm(`确定删除《${currentArticle.title}》吗？按住 Shift 点击删除可清空我的文章。`);
      if (!ok) return;
      const deletedId = currentArticle.id;
      const index = customArticles.findIndex(item => item.id === deletedId);
      customArticles = customArticles.filter(item => item.id !== deletedId);
      saveCustomArticles();
      const next = customArticles[Math.min(index, customArticles.length - 1)];
      refreshArticles(next && next.id, customArticles.length ? "custom" : firstAvailableCollection());
      reset();
      showToast("已删除当前文章。");
    }

    function hideCurrentCollection() {
      const collection = collections.find(item => item.id === currentCollection);
      if (!collection) return;
      if (collection.fixed) {
        showToast("指法练习是固定栏目，不能删除。");
        return;
      }
      const ok = window.confirm(`确定从界面删除栏目“${collection.title}”吗？内容文件仍保留，刷新不会自动恢复。`);
      if (!ok) return;
      hiddenCollections.add(currentCollection);
      saveHiddenCollections();
      refreshArticles(null, firstAvailableCollection());
      reset();
      showToast(`已隐藏栏目“${collection.title}”。`);
    }

    function isEditorTarget(targetNode) {
      return targetNode.closest && targetNode.closest(".editor, .article-tools");
    }

    function handleKeydown(event) {
      if (isEditorTarget(event.target)) return;
      if (event.ctrlKey && event.altKey && event.key.toLowerCase() === "r") {
        event.preventDefault();
        restoreHiddenCollections();
        return;
      }
      if (event.ctrlKey || event.metaKey || event.altKey) return;
      if (event.key === "Escape") {
        event.preventDefault();
        reset();
        return;
      }
      if (event.key === " " && isPagedCollection()) {
        event.preventDefault();
        selectNextArticle();
        return;
      }
      if (event.key === "Backspace") {
        event.preventDefault();
        if (position > 0) position -= 1;
        updateUi();
        clickSound(false);
        return;
      }

      const typed = normalizeKey(event);
      if (typed.length !== 1 || !target.length) return;
      event.preventDefault();
      const expected = nextChar();
      const ok = typed === expected;
      markPressed(typed, ok);
      if (!startTime) startTime = Date.now();

      if (ok) {
        position += 1;
        right += 1;
        clickSound(true);
        if (position === target.length) {
          updateUi();
          showCompletionToast();
          return;
        }
      } else {
        wrong += 1;
        clickSound(false);
        showToast(`应该按 ${keyLabel(expected)}，刚才按的是 ${keyLabel(typed)}。`);
      }
      updateUi();
    }

    function showCompletionToast() {
      const total = right + wrong;
      const accuracy = total ? Math.round((right / total) * 100) : 100;
      const seconds = Math.max(1, Math.round((Date.now() - startTime) / 1000));
      const kpm = Math.round((right / seconds) * 60);
      const advice = accuracy >= 95 ? "建议进入下一关。" : "建议再练一遍。";
      showToast(`完成！正确率 ${accuracy}%｜用时 ${seconds}s｜${kpm} 键/分。${advice}`, 5200);
    }

    function restoreHiddenCollections() {
      hiddenCollections = new Set();
      saveHiddenCollections();
      refreshArticles(null, "fingering");
      reset();
      showToast("已恢复所有默认栏目。");
    }

    document.addEventListener("keydown", handleKeydown);
    document.addEventListener("pointerdown", () => inputEl.focus());
    window.addEventListener("load", () => inputEl.focus());
    collectionSelectEl.addEventListener("change", () => selectCollection(collectionSelectEl.value));
    articleSelectEl.addEventListener("change", () => selectArticle(articleSelectEl.value));
    addArticleBtn.addEventListener("click", openEditor);
    importTxtBtn.addEventListener("click", () => txtFileInput.click());
    txtFileInput.addEventListener("change", () => importTxtFile(txtFileInput.files[0]));
    deleteArticleBtn.addEventListener("click", deleteCurrentArticle);
    cancelArticleBtn.addEventListener("click", closeEditor);
    autoPinyinBtn.addEventListener("click", fillAutoPinyin);
    articleDisplayInput.addEventListener("input", () => {
      if (!articleTargetInput.value.trim()) articleTargetInput.value = generatedTargetFor(articleDisplayInput.value);
    });
    articleForm.addEventListener("submit", saveArticle);
    editorBackdrop.addEventListener("pointerdown", event => {
      if (event.target === editorBackdrop) closeEditor();
    });

    refreshArticles();
    renderPhrase();
    renderKeyboard();
    updateUi();
  </script>
</body>
</html>
